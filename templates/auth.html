<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HabitFlow – {% if mode == 'login' %}Sign In{% else %}Create Account{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body data-mode="{{ mode }}">
  <div class="bg-decor bg-decor-1"></div>
  <div class="bg-decor bg-decor-2"></div>
  <div class="bg-decor bg-decor-3"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Habit<span>Flow</span></h1>
        <p>Build habits, track your journey</p>
      </div>

      <div class="auth-tabs">
        <a href="/login" class="auth-tab {% if mode == 'login' %}active{% endif %}">Sign In</a>
        <a href="/register" class="auth-tab {% if mode == 'register' %}active{% endif %}">Create Account</a>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      {% if mode == 'login' %}
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
      </form>

      {% else %}
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="form-control" id="username" placeholder="your_username" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required minlength="6">
          </div>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
      </form>
      {% endif %}
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
